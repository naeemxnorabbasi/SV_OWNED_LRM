# Clause factory contract (owned-full-LRM workspace copy)
# Canonical sync: SV_UPF_SPEC/SV_SPEC/schemas/clause_factory_contract.yaml

schema_version: "1.0"

required_fields:
  - owned_id
  - lrm_clause_id
  - lrm_section
  - title
  - owned_must
  - oracle
  - tests
  - file_ownership_pod

oracle:
  driver: slang
  parity_min: 0.99
  corpus_stems: []

tests:
  m5_test_id: null
  feature_test_stem: null
  reference_projects: []

implementation:
  pod: null
  cpp_files: []
  ir_extensions: []

promotion:
  from_status: partial
  to_status: supported
  matrix_ids: []
  same_commit:
    - SV_SPEC/lrm_clause_index.yaml
    - sv_frontend/docs/conformance/feature_matrix.yaml

verification_commands:
  - cd ~/sv_frontend && bash scripts/run_autopilot_gate.sh
  - cd ~/sv_frontend && bash scripts/run_oracle_farm.sh --stem <stem>
