  autopilot_gate: ../sv_frontend/scripts/run_autopilot_gate.sh
  oracle_farm: ../sv_frontend/scripts/run_oracle_farm.sh
  file_ownership: docs/orchestration/FILE_OWNERSHIP.yaml
