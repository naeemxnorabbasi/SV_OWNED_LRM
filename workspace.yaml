  spec_root: ../SV_UPF_SPEC
  lrm_clause_index: ../SV_UPF_SPEC/SV_SPEC/lrm_clause_index.yaml
  requirements_index: ../SV_UPF_SPEC/SV_SPEC/requirements_index.yaml

